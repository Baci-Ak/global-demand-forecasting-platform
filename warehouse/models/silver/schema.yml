version: 2

models:
  - name: silver_m5_calendar
    description: "Silver (cleaned/typed) calendar dimension built from staging.m5_calendar_raw."
    columns:
      - name: d
        description: "M5 day identifier (e.g. d_1, d_2, ...). Primary key for the calendar dimension."
        data_tests:
          - not_null
          - unique

      - name: date
        description: "Calendar date."
        data_tests:
          - not_null

      - name: wm_yr_wk
        description: "Walmart year-week code."
        data_tests:
          - not_null

      - name: weekday
        description: "Day name (Monday..Sunday)."
        data_tests:
          - not_null

      - name: year
        description: "Year derived from date."
        data_tests:
          - not_null

      - name: month
        description: "Month (1-12) derived from date."
        data_tests:
          - not_null

      - name: day
        description: "Day of month (1-31) derived from date."
        data_tests:
          - not_null

      - name: day_of_week
        description: "ISO day of week: 1=Monday .. 7=Sunday."
        data_tests:
          - not_null



  - name: silver_m5_sell_prices
    description: "Silver (cleaned/typed) sell prices built from staging.m5_sell_prices_raw."
    columns:
      - name: store_id
        description: "Store identifier."
        data_tests:
          - not_null

      - name: item_id
        description: "Item identifier."
        data_tests:
          - not_null

      - name: wm_yr_wk
        description: "Walmart year-week code."
        data_tests:
          - not_null

      - name: sell_price
        description: "Sell price for item/store/week."
        data_tests:
          - not_null


# Silver daily sales fact table built from long-form staging sales and enriched with calendar dates.
  - name: silver_m5_sales
    description: "Silver daily sales fact table built from long-form staging sales and enriched with calendar dates."
    columns:
      - name: id
        description: "Series identifier (unique per item/store)."
        data_tests:
          - not_null

      - name: item_id
        description: "Item identifier."
        data_tests:
          - not_null

      - name: dept_id
        description: "Department identifier."
        data_tests:
          - not_null

      - name: cat_id
        description: "Category identifier."
        data_tests:
          - not_null

      - name: store_id
        description: "Store identifier."
        data_tests:
          - not_null

      - name: state_id
        description: "State identifier."
        data_tests:
          - not_null

      - name: d
        description: "M5 day identifier (e.g. d_1880)."
        data_tests:
          - not_null

      - name: date
        description: "Calendar date (joined from silver_m5_calendar)."
        data_tests:
          - not_null

      - name: sales
        description: "Daily unit sales (>= 0)."
        data_tests:
          - not_null


# Daily sales enriched with weekly sell prices
  - name: silver_m5_sales_with_prices
    description: "Daily sales enriched with weekly sell prices by joining on store_id, item_id, and wm_yr_wk."
    columns:
      - name: id
        description: "Series identifier (unique per item/store)."
        data_tests:
          - not_null

      - name: item_id
        description: "Item identifier."
        data_tests:
          - not_null

      - name: store_id
        description: "Store identifier."
        data_tests:
          - not_null

      - name: d
        description: "M5 day identifier."
        data_tests:
          - not_null

      - name: date
        description: "Calendar date."
        data_tests:
          - not_null

      - name: wm_yr_wk
        description: "Walmart year-week code for the date."
        data_tests:
          - not_null

      - name: sales
        description: "Daily unit sales."
        data_tests:
          - not_null

      - name: sell_price
        description: "Weekly sell price matched to the sales row (may be null if no price exists for that week/item/store)."



