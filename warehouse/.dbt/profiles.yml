# CI-only dbt profiles (NO REAL CREDENTIALS).
# Purpose:
# - Allow `dbt parse` to run in GitHub Actions without any database.
# - dbt requires the named profile to exist even for parsing.

warehouse:
  target: ci
  outputs:
    ci:
      type: postgres
      host: "localhost"
      user: "ci"
      password: "ci"
      port: 5432
      dbname: "ci"
      schema: "public"
      threads: 1

warehouse_redshift:
  target: ci
  outputs:
    ci:
      type: redshift
      host: "localhost"
      user: "ci"
      password: "ci"
      port: 5439
      dbname: "ci"
      schema: "public"
      threads: 1
      sslmode: "require"
