# ------------------------------------------------------------------------------
# File: warehouse/.dbt/profiles.yml
#
# Purpose
# - dbt connection profiles for this repository.
# - This file is SAFE to commit because it contains NO secrets.
#
# How it works
# - All connection fields are loaded from environment variables via env_var().
# - Local development: values come from your local `.env` (not committed).
# - CI/CD: values come from GitHub Secrets (injected as env vars).
#
# IMPORTANT
# - Do NOT hardcode credentials here.
# - Ensure the required environment variables are set before running dbt.
# ------------------------------------------------------------------------------

warehouse_redshift:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      dbname: "{{ env_var('REDSHIFT_DBNAME', 'dev') }}"
      schema: "{{ env_var('STAGING_SCHEMA', 'staging') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      sslmode: require

    ci:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      dbname: "{{ env_var('REDSHIFT_DBNAME', 'dev') }}"
      schema: "{{ env_var('STAGING_SCHEMA', 'staging') }}"
      threads: 2
      sslmode: require


    prod:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      dbname: "{{ env_var('REDSHIFT_DBNAME', 'gdf_warehouse') }}"
      schema: "{{ env_var('STAGING_SCHEMA', 'staging') }}"
      threads: "{{ env_var('DBT_THREADS', '8') | int }}"
      sslmode: require

