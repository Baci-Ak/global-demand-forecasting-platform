# Non-secret runtime config for MWAA startup

AWS_REGION=us-east-1

# ------------------------------------------------------------------------------
# Runtime config location (lets startup.sh avoid hardcoding)
# ------------------------------------------------------------------------------
GDF_RUNTIME_CONF_S3_URI=s3://gdf-prod-airflow-697980229152/airflow/startup/gdf_runtime.conf

# ------------------------------------------------------------------------------
# Application wheel (installed by startup.sh)
# ------------------------------------------------------------------------------
WHEEL_S3_BUCKET=gdf-prod-airflow-697980229152
WHEEL_S3_KEY=airflow/packages/gdf-0.1.0-py3-none-any.whl
WHEEL_FILENAME=gdf-0.1.0-py3-none-any.whl

# ------------------------------------------------------------------------------
# Secrets Manager IDs (names) to fetch at runtime
# ------------------------------------------------------------------------------
POSTGRES_DSN_SECRET_ID=gdf/prod/postgres_dsn
WAREHOUSE_DSN_SECRET_ID=gdf/prod/warehouse_dsn
REDSHIFT_ADMIN_SECRET_ID=gdf/prod/redshift/admin

# ------------------------------------------------------------------------------
# Data bucket used by the pipeline
# ------------------------------------------------------------------------------
BRONZE_BUCKET=gdf-prod-bronze-697980229152

# ------------------------------------------------------------------------------
# Alembic artifacts location (uploaded via `make mwaa-upload-alembic`)
# ------------------------------------------------------------------------------
# ------------------------------------------------------------------------------
# Alembic artifacts location (uploaded via `make mwaa-upload-alembic`)
# ------------------------------------------------------------------------------
#ALEMBIC_S3_URI=s3://gdf-dev-airflow/airflow/startup/alembic
# ------------------------------------------------------------------------------
# Audit schema (used by Alembic + audit logging)
# ------------------------------------------------------------------------------
#AUDIT_SCHEMA=audit


# ------------------------------------------------------------------------------
# Kaggle credentials (JSON secret)
# ------------------------------------------------------------------------------
KAGGLE_SECRET_ID=gdf/prod/kaggle_credentials

# set this in the secrets manager on plain text:
#{
  #"KAGGLE_USERNAME": "bassicim",
  #"KAGGLE_API_TOKEN": "your_api_token",
  #"M5_COMPETITION": "m5-forecasting-accuracy"
#}

STAGING_SCHEMA=staging
DBT_TARGET=prod
DBT_THREADS=4


# ------------------------------------------------------------------------------
# M5 loader configuration
# ------------------------------------------------------------------------------
MAX_D_COLS=1913

# ------------------------------------------------------------------------------
# Weather source
# ------------------------------------------------------------------------------
WEATHER_SOURCE_NAME=weather_openmeteo
WEATHER_PROVIDER=openmeteo
WEATHER_BASE_URL=https://archive-api.open-meteo.com/v1/archive
WEATHER_DEFAULT_HISTORICAL_DAYS=14



# ------------------------------------------------------------------------------
# Macro source
# ------------------------------------------------------------------------------
MACRO_SOURCE_NAME=macro_fred
MACRO_PROVIDER=fred
MACRO_BASE_URL=https://api.stlouisfed.org/fred/series/observations


MACRO_SECRET_ID=gdf/prod/fred_api_key





# ------------------------------------------------------------------------------
# Trends source
# ------------------------------------------------------------------------------
TRENDS_SOURCE_NAME=trends_google
TRENDS_PROVIDER=google_trends
TRENDS_GEO=US



# ------------------------------------------------------------------------------
# Forecast application snapshot export
# ------------------------------------------------------------------------------
LAYER2_SNAPSHOT_BUCKET=gdf-prod-forecast-application-697980229152
LAYER2_SNAPSHOT_PREFIX=public_forecast_application
LOCAL_SNAPSHOT_CACHE_DIR=/usr/local/airflow/local_snapshot_cache



