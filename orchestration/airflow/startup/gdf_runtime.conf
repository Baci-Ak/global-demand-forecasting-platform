# Non-secret runtime config for MWAA startup

AWS_REGION=us-east-1

# ------------------------------------------------------------------------------
# Runtime config location (lets startup.sh avoid hardcoding)
# ------------------------------------------------------------------------------
GDF_RUNTIME_CONF_S3_URI=s3://gdf-prod-airflow/airflow/startup/gdf_runtime.conf

# ------------------------------------------------------------------------------
# Application wheel (installed by startup.sh)
# ------------------------------------------------------------------------------
WHEEL_S3_BUCKET=gdf-prod-airflow
WHEEL_S3_KEY=airflow/packages/gdf-0.1.0-py3-none-any.whl
WHEEL_FILENAME=gdf-0.1.0-py3-none-any.whl

# ------------------------------------------------------------------------------
# Secrets Manager IDs (names) to fetch at runtime
# ------------------------------------------------------------------------------
POSTGRES_DSN_SECRET_ID=gdf/prod/postgres_dsn
WAREHOUSE_DSN_SECRET_ID=gdf/prod/warehouse_dsn
REDSHIFT_ADMIN_SECRET_ID=gdf/prod/redshift/admin

# ------------------------------------------------------------------------------
# Data bucket used by the pipeline
# ------------------------------------------------------------------------------
BRONZE_BUCKET=gdf-prod-bronze

# ------------------------------------------------------------------------------
# Alembic artifacts location (uploaded via `make mwaa-upload-alembic`)
# ------------------------------------------------------------------------------
# ------------------------------------------------------------------------------
# Alembic artifacts location (uploaded via `make mwaa-upload-alembic`)
# ------------------------------------------------------------------------------
#ALEMBIC_S3_URI=s3://gdf-dev-airflow/airflow/startup/alembic
# ------------------------------------------------------------------------------
# Audit schema (used by Alembic + audit logging)
# ------------------------------------------------------------------------------
#AUDIT_SCHEMA=audit


# ------------------------------------------------------------------------------
# Kaggle credentials (JSON secret)
# ------------------------------------------------------------------------------
KAGGLE_SECRET_ID=gdf/prod/kaggle_credentials

STAGING_SCHEMA=staging
DBT_TARGET=prod
DBT_THREADS=4