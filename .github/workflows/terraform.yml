# ------------------------------------------------------------------------------
# Terraform workflow (CD foundation)
#
# Purpose:
# - On PRs: run terraform fmt/validate + generate a plan (no apply)
# - On main/dev pushes: (apply will be added later after we set up secure AWS auth)
#
# Security:
# - This workflow does NOT apply changes yet.
# - We will add OIDC-based AWS authentication before any apply step.
# ------------------------------------------------------------------------------

name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  push:
    branches: ["main", "dev"]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read

jobs:
  plan:
    name: terraform plan (no apply)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt (check)
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: infra/terraform/env/dev
        run: |
          terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform/env/dev
        run: |
          terraform validate

      # Plan step will be enabled once AWS auth is configured via GitHub OIDC.
      - name: Terraform plan (disabled until OIDC auth is added)
        run: |
          echo "Plan is disabled until we add secure AWS auth (GitHub OIDC)."
