# ------------------------------------------------------------------------------
# Terraform workflow (CD foundation)
#
# Purpose:
# - On PRs: run terraform fmt/validate + generate a plan (no apply)
# - On main/dev pushes: (apply will be added later after we set up secure AWS auth)
#
# Security:
# - This workflow does NOT apply changes yet.
# - We will add OIDC-based AWS authentication before any apply step.
# ------------------------------------------------------------------------------

name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  push:
    branches: ["main", "dev"]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read

jobs:
  plan:
    name: terraform plan (no apply)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt (check)
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive

      - name: Terraform init (remote backend)
        working-directory: infra/terraform/env/dev
        run: |
          terraform init

      - name: Terraform validate
        working-directory: infra/terraform/env/dev
        run: |
          terraform validate

      # Enable Terraform plan in GitHub Actions using OIDC (no no secrets)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::798329741238:role/global-demand-forecasting-github-actions-dev
          aws-region: us-east-1

      # Run Terraform plan (dev)
      - name: Terraform plan (dev)
        working-directory: infra/terraform/env/dev
        run: |
          terraform plan -var-file=terraform.tfvars

        #Enab Terraform apply on pushes to dev
      - name: Terraform apply (dev)
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        working-directory: infra/terraform/env/dev
        run: |
          terraform apply -auto-approve -var-file=terraform.tfvars




