# ==============================================================================
# Dev - Audit DB Migrations (manual)
# ==============================================================================
#
# Purpose
# - Run Alembic migrations against the DEV audit RDS Postgres.
# - Manual-only to avoid accidental schema changes.
#
# Design
# - Uses GitHub OIDC to assume AWS role (no static AWS keys).
# - DSN is pulled from AWS Secrets Manager via Makefile target `aws-db-upgrade`.
# ==============================================================================

name: Dev - DB Migrate (Audit DB)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      # ------------------------------------------------------------------------
      # Source
      # ------------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Auth (OIDC)
      # ------------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ------------------------------------------------------------------------
      # Python environment
      # ------------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------------
      # Install project (so alembic + config modules are available)
      # ------------------------------------------------------------------------
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install -e .

      # ------------------------------------------------------------------------
      # Migrate
      # ------------------------------------------------------------------------
      - name: Alembic upgrade head (dev)
        env:
          AUDIT_SCHEMA: ${{ vars.AUDIT_SCHEMA }}
        run: |
          make aws-db-upgrade POSTGRES_DSN_SECRET_ID="gdf/dev/postgres_dsn"