# ------------------------------------------------------------------------------
# CD / Pipeline Workflow (No Terraform)
#
# What this workflow is
# - This is the "CD" side of CI/CD for the data platform:
#   it runs the end-to-end pipeline in a clean GitHub runner.
#
# When it runs
# - On pushes to the `dev` branch.
#
# What it runs
# - `make warehouse-refresh`
#   which executes:
#     ingest -> dq -> stage -> silver -> gold
#
# Secrets / Configuration
# - This workflow DOES NOT read .env.
# - It receives configuration from GitHub Secrets (repo settings).
#
# IMPORTANT NOTE (current state)
# - If POSTGRES_DSN points to localhost, this workflow will fail in GitHub Actions.
# - We will move the audit DB to RDS so the runner can reach it.
# ------------------------------------------------------------------------------

name: pipeline

on:
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  run-pipeline:
    name: run warehouse-refresh (dev)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1) Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2) Set up Python runtime
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # 3) Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dbt.txt

      # -----------------------------------------------------------------------
      # 4) Run the canonical pipeline entrypoint
      # -----------------------------------------------------------------------
      - name: Run warehouse refresh
        env:
          # -----------------------------
          # Audit DB (currently local -> will move to RDS)
          # -----------------------------
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}

          # -----------------------------
          # AWS (S3 + boto3)
          # -----------------------------
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BRONZE_BUCKET: ${{ secrets.BRONZE_BUCKET }}

          # -----------------------------
          # Warehouse (Redshift)
          # -----------------------------
          WAREHOUSE_DSN: ${{ secrets.WAREHOUSE_DSN }}
          REDSHIFT_IAM_ROLE_ARN: ${{ secrets.REDSHIFT_IAM_ROLE_ARN }}

          # -----------------------------
          # Kaggle (source ingestion)
          # -----------------------------
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          M5_COMPETITION: ${{ secrets.M5_COMPETITION }}
          M5_SOURCE_NAME: ${{ secrets.M5_SOURCE_NAME }}
          M5_DESTINATION: ${{ secrets.M5_DESTINATION }}

        run: |
          make warehouse-refresh
