# ------------------------------------------------------------------------------
# CD / Pipeline Workflow (No Terraform)
#
# What this workflow is
# - This is the "CD" side of CI/CD for the data platform:
#   it runs the end-to-end pipeline in a clean GitHub runner.
#
# When it runs
# - On pushes to the `dev` branch.
#
# What it runs
# - `make warehouse-refresh`
#   which executes:
#     ingest -> dq -> stage -> silver -> gold
#
# Secrets / Configuration
# - This workflow DOES NOT read .env.
# - It receives configuration from GitHub Secrets (repo settings).
#
# Critical production detail
# - The audit DB (Postgres) must have its schema/tables created before ingestion.
# - We run Alembic migrations (`alembic upgrade head`) at the start of the job.
# ------------------------------------------------------------------------------

name: pipeline

on:
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  run-pipeline:
    name: run warehouse-refresh (dev)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Set up Python runtime
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dbt.txt

      # -----------------------------------------------------------------------
      # Generate dbt profiles.yml for CI
      #
      # Why:
      # - GitHub runners do not have ~/.dbt/profiles.yml
      # - We create a minimal profile in-repo and point dbt to it via Makefile:
      #     DBT_PROFILES_DIR=.dbt
      #
      # Requirement:
      # - The following GitHub Secrets must exist:
      #     REDSHIFT_HOST, REDSHIFT_USER, REDSHIFT_PASSWORD,
      #     REDSHIFT_PORT, REDSHIFT_DBNAME, STAGING_SCHEMA
      # -----------------------------------------------------------------------
      - name: Write dbt profiles.yml (CI)
        env:
          REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_USER: ${{ secrets.REDSHIFT_USER }}
          REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}
          REDSHIFT_PORT: ${{ secrets.REDSHIFT_PORT }}
          REDSHIFT_DBNAME: ${{ secrets.REDSHIFT_DBNAME }}
          STAGING_SCHEMA: ${{ secrets.STAGING_SCHEMA }}
        run: |
          mkdir -p .dbt
          cat > .dbt/profiles.yml << EOF
          warehouse_redshift:
            target: ci
            outputs:
              ci:
                type: redshift
                host: ${REDSHIFT_HOST}
                user: ${REDSHIFT_USER}
                password: ${REDSHIFT_PASSWORD}
                port: ${REDSHIFT_PORT}
                dbname: ${REDSHIFT_DBNAME}
                schema: ${STAGING_SCHEMA}
                threads: 4
                sslmode: require
          EOF

      # -----------------------------------------------------------------------
      # Ensure audit schema/tables exist (RDS) via Make target
      #
      # Why:
      # - Ingestion/DQ writes to audit tables; migrations must run first.
      # -----------------------------------------------------------------------
      - name: Migrate audit DB (make db-upgrade)
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          AUDIT_SCHEMA: ${{ secrets.AUDIT_SCHEMA }}
        run: |
          make db-upgrade

      # -----------------------------------------------------------------------
      #  Run the canonical pipeline entrypoint
      # -----------------------------------------------------------------------
      - name: Run warehouse refresh
        env:
          # -----------------------------
          # Audit DB (Postgres RDS)
          # -----------------------------
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          AUDIT_SCHEMA: ${{ secrets.AUDIT_SCHEMA }}

          # -----------------------------
          # AWS (S3 + boto3)
          # -----------------------------
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BRONZE_BUCKET: ${{ secrets.BRONZE_BUCKET }}

          # -----------------------------
          # Warehouse (Redshift)
          # -----------------------------
          WAREHOUSE_DSN: ${{ secrets.WAREHOUSE_DSN }}
          REDSHIFT_IAM_ROLE_ARN: ${{ secrets.REDSHIFT_IAM_ROLE_ARN }}

          # -----------------------------
          # Kaggle (source ingestion)
          # -----------------------------
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          M5_COMPETITION: ${{ secrets.M5_COMPETITION }}
          M5_SOURCE_NAME: ${{ secrets.M5_SOURCE_NAME }}
          M5_DESTINATION: ${{ secrets.M5_DESTINATION }}

          # -----------------------------
          # dbt (CI profile location)
          # -----------------------------
          DBT_PROFILES_DIR: .dbt
        run: |
          make warehouse-refresh
