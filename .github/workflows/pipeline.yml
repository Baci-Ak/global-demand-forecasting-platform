# ------------------------------------------------------------------------------
# Pipeline Workflow (No Terraform)
#
# Purpose
# - Run the end-to-end data pipeline automatically on pushes to dev:
#     ingest -> dq -> stage -> silver -> gold
#
# Why this is production-style (even without IaC)
# - Uses a single canonical entrypoint: `make warehouse-refresh`
# - Secrets are NOT read from .env in CI (we'll inject via GitHub Secrets)
# - Runs in a clean, ephemeral runner
#
# Notes
# - This workflow assumes AWS resources already exist (S3 bucket, Redshift, IAM).
# - Next steps will:
#     1) Add GitHub Secrets and wire them into env vars
#     2) Remove reliance on local temp files for ingestion (streaming/S3 upload)
# ------------------------------------------------------------------------------

name: pipeline

on:
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  run-pipeline:
    name: run warehouse-refresh (dev)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1) Checkout code
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2) Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # 3) Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dbt.txt

      # -----------------------------------------------------------------------
      # 4) Run pipeline
      #
      # IMPORTANT:
      # - We will provide env vars via GitHub Secrets in the next step.
      # -----------------------------------------------------------------------
      - name: Run warehouse refresh
        run: |
          make warehouse-refresh
