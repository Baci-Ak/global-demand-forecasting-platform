# ==============================================================================
# Prod - Deploy to MWAA (manual)
# ==============================================================================
#
# Purpose
# - Deploy MWAA artifacts to production on demand.
# - Prevent accidental MWAA restarts caused by normal commits.
#
# Safety
# - Uses GitHub Environment: prod (should require reviewer approval).
# - Uses GitHub OIDC to assume AWS role (no static AWS keys).
#
# Usage
# - GitHub → Actions → this workflow → Run workflow
# - deploy_scope:
#   - dags-only : sync DAGs to S3 (no MWAA update)
#   - full      : deploy runtime artifacts + wheel, then trigger MWAA update
# ==============================================================================

name: Prod - Deploy to MWAA (manual)

# ------------------------------------------------------------------------------
# Trigger (manual only)
# ------------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: "What to deploy"
        required: true
        default: "dags-only"
        type: choice
        options:
          - dags-only
          - full

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    # --------------------------------------------------------------------------
    # Required for OIDC -> AWS STS
    # --------------------------------------------------------------------------
    permissions:
      id-token: write
      contents: read

    steps:
      # ------------------------------------------------------------------------
      # Source
      # ------------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Auth (OIDC)
      # ------------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ------------------------------------------------------------------------
      # System dependencies
      # ------------------------------------------------------------------------
      - name: Install system deps (zip)
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      # ------------------------------------------------------------------------
      # Deploy: DAGs only (no MWAA update needed)
      # ------------------------------------------------------------------------
      - name: Deploy DAGs only (prod)
        if: ${{ inputs.deploy_scope == 'dags-only' }}
        env:
          MWAA_DAG_BUCKET: ${{ vars.MWAA_BUCKET }}
        run: |
          make mwaa-upload-dags

      # ------------------------------------------------------------------------
      # Deploy: Full runtime (wheel + requirements + plugins + startup)
      # ------------------------------------------------------------------------
      - name: Deploy full runtime (prod)
        if: ${{ inputs.deploy_scope == 'full' }}
        env:
          MWAA_DAG_BUCKET: ${{ vars.MWAA_BUCKET }}
        run: |
          make mwaa-ci-deploy

      # ------------------------------------------------------------------------
      # MWAA refresh
      # - Needed for requirements/plugins/startup changes to take effect.
      # ------------------------------------------------------------------------
      - name: Trigger MWAA environment update (prod)
        if: ${{ inputs.deploy_scope == 'full' }}
        run: |
          aws mwaa update-environment \
            --name "${{ vars.MWAA_ENV_NAME }}" \
            --region "${{ vars.AWS_REGION }}"