# ==============================================================================
# Prod - Deploy to MWAA (manual)
# ==============================================================================
#
# Purpose
# - Deploy MWAA artifacts to production on demand.
# - Prevent accidental MWAA restarts caused by normal commits.
#
# Safety
# - Uses GitHub Environment: prod (should require reviewer approval).
# - Uses GitHub OIDC to assume AWS role (no static AWS keys).
#
# Usage
# - GitHub → Actions → this workflow → Run workflow
# - deploy_scope:
#   - dags-only : sync DAGs to S3 only (no Terraform apply)
#   - full      : deploy runtime artifacts + wheel, then Terraform apply prod MWAA
#
# Important
# - DAG-only changes do NOT require Terraform apply.
# - Runtime changes (startup.sh, requirements, plugins, wheel bootstrap behavior)
#   MUST go through Terraform apply for the prod MWAA stack so the environment
#   actually picks up the latest registered artifacts.
# ==============================================================================

name: Prod - Deploy to MWAA (manual)

on:
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: "What to deploy"
        required: true
        default: "dags-only"
        type: choice
        options:
          - dags-only
          - full

concurrency:
  group: prod-mwaa-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      MWAA_DAG_BUCKET: ${{ vars.MWAA_BUCKET }}

    steps:
      # ------------------------------------------------------------------------
      # Source
      # ------------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Auth (OIDC)
      # ------------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ------------------------------------------------------------------------
      # System dependencies
      # ------------------------------------------------------------------------
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      # ------------------------------------------------------------------------
      # Python build tooling
      # - Needed for wheel build in full deploys
      # ------------------------------------------------------------------------
      - name: Set up Python
        if: ${{ inputs.deploy_scope == 'full' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------------
      # Terraform tooling
      # - Needed only for full deploys
      # ------------------------------------------------------------------------
      - name: Set up Terraform
        if: ${{ inputs.deploy_scope == 'full' }}
        uses: hashicorp/setup-terraform@v3

      # ------------------------------------------------------------------------
      # Deploy: DAGs only
      # ------------------------------------------------------------------------
      - name: Deploy DAGs only (prod)
        if: ${{ inputs.deploy_scope == 'dags-only' }}
        run: |
          make mwaa-upload-dags

      # ------------------------------------------------------------------------
      # Deploy: Full runtime artifacts
      # - Upload DAGs, requirements, plugins, startup, and wheel
      # ------------------------------------------------------------------------
      - name: Deploy full runtime artifacts (prod)
        if: ${{ inputs.deploy_scope == 'full' }}
        run: |
          make mwaa-ci-deploy

      # ------------------------------------------------------------------------
      # Apply Terraform for prod MWAA
      # - This is the critical step that makes MWAA actually pick up runtime
      #   changes such as startup.sh / requirements / plugins and forces the
      #   environment update through the Terraform source of truth.
      # ------------------------------------------------------------------------
      - name: Terraform apply prod MWAA stack
        if: ${{ inputs.deploy_scope == 'full' }}
        working-directory: infra/terraform/envs/prod
        run: |
          make apply-mwaa