name: Dev - Sync secrets to AWS Secrets Manager

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Write secrets to Secrets Manager (dev)
        shell: bash
        run: |
          set -euo pipefail

          aws secretsmanager put-secret-value \
            --secret-id "gdf/dev/kaggle/api_token" \
            --secret-string "${{ secrets.KAGGLE_API_TOKEN_DEV }}"

          aws secretsmanager put-secret-value \
            --secret-id "gdf/dev/postgres_dsn" \
            --secret-string "${{ secrets.POSTGRES_DSN_DEV }}"

          aws secretsmanager put-secret-value \
            --secret-id "gdf/dev/warehouse_dsn" \
            --secret-string "${{ secrets.WAREHOUSE_DSN_DEV }}"
