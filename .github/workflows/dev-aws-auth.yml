name: Dev - Deploy MWAA Artifacts

on:
  push:
    branches:
      - dev
    paths:
      - "orchestration/airflow/dags/**"
      - "orchestration/airflow/plugins/**"
      - "orchestration/airflow/startup/**"
      - "docker/airflow/requirements-mwaa.txt"
      - "Makefile"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Upload DAGs / requirements / plugins / startup to S3 (dev)
        env:
          MWAA_DAG_BUCKET: ${{ vars.MWAA_BUCKET }}
          MWAA_DAG_PREFIX: airflow/dags
          MWAA_REQ_PREFIX: airflow/requirements
          MWAA_PLUGINS_PREFIX: airflow/plugins
          MWAA_STARTUP_PREFIX: airflow/startup
        run: |
          make mwaa-upload-all

      - name: Trigger MWAA environment refresh (dev)
        run: |
          aws mwaa update-environment \
            --name "${{ vars.MWAA_ENV_NAME }}" \
            --region "${{ vars.AWS_REGION }}"